name: Hermes Dispatch

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  RELEASE_BRANCH: release/next

jobs:
  hermes:
    name: Prepare Offering
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.HERMES_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e645b0cf01249a964ec099494d38d2da0f0b349f # stable
        with:
          toolchain: stable

      - name: Install git-cliff
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: git-cliff

      - name: Configure git
        run: |
          git config user.name "Hermes"
          git config user.email "hermes@herald.dev"

      - name: Determine next version
        id: version
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          # Determine bump type from conventional commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          # Check for breaking changes, features, or meaningful fixes
          # Exclude ci/chore/docs/build scopes — they don't warrant a release
          HAS_BREAKING=$(git log "$RANGE" --format="%s" | grep -c "^.*!:" || true)
          HAS_FEAT=$(git log "$RANGE" --format="%s" | grep -c "^feat" || true)
          HAS_FIX=$(git log "$RANGE" --format="%s" | grep "^fix" | grep -vcE "^fix\((ci|deps|build|docs|chore)\)" || true)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$HAS_BREAKING" -gt 0 ]; then
            if [ "$MAJOR" -eq 0 ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            fi
          elif [ "$HAS_FEAT" -gt 0 ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$HAS_FIX" -gt 0 ]; then
            PATCH=$((PATCH + 1))
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No releasable commits since $LAST_TAG"
            exit 0
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump: $CURRENT → $NEXT"

      - name: Check for existing release PR
        if: steps.version.outputs.skip != 'true'
        id: existing_pr
        run: |
          PR_NUM=$(gh pr list --head "$RELEASE_BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.HERMES_TOKEN }}

      - name: Prepare release branch
        if: steps.version.outputs.skip != 'true'
        run: |
          NEXT="${{ steps.version.outputs.next }}"

          # Create or reset release branch from main
          git checkout -B "$RELEASE_BRANCH"

          # Bump version in Cargo.toml (workspace root package)
          sed -i "s/^version = \"${{ steps.version.outputs.current }}\"/version = \"${NEXT}\"/" Cargo.toml

          # Update Cargo.lock
          cargo generate-lockfile

          # Generate changelog
          git-cliff --tag "v${NEXT}" --output CHANGELOG.md

          # Commit changes
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore: release v${NEXT}

          Automated by Hermes Dispatch.
          
          Version: ${{ steps.version.outputs.current }} → ${NEXT}
          " || echo "No changes to commit"

      - name: Push and create/update PR
        if: steps.version.outputs.skip != 'true'
        run: |
          NEXT="${{ steps.version.outputs.next }}"

          git push --force origin "$RELEASE_BRANCH"

          if [ -n "${{ steps.existing_pr.outputs.pr_number }}" ]; then
            echo "Updated existing PR #${{ steps.existing_pr.outputs.pr_number }}"
          else
            gh pr create \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "⚡ Release v${NEXT}" \
              --body "## Release v${NEXT}

          This PR was prepared by **Hermes Dispatch**.

          ### What happens when you merge this PR:
          1. Version bumped to \`${NEXT}\` in Cargo.toml
          2. CHANGELOG.md updated via git-cliff
          3. Git tag \`v${NEXT}\` will be created
          4. **Hephaestus Forge** will build cross-platform binaries
          5. GitHub Release published automatically

          ---
          *Merge when ready to release.*"
          fi
        env:
          GH_TOKEN: ${{ secrets.HERMES_TOKEN }}

  # After a release PR is merged, tag the release
  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    # Only run if Cargo.toml version changed in this push (i.e., release PR was merged)
    if: |
      github.event_name == 'push' &&
      contains(github.event.head_commit.message, 'chore: release v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.HERMES_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Hermes"
          git config user.email "hermes@herald.dev"

      - name: Extract version and create tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "✓ Created and pushed tag: $TAG"
        env:
          GH_TOKEN: ${{ secrets.HERMES_TOKEN }}
